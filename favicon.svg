<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#1A1714"/>
  <!-- Canvas (parchment inner) -->
  <rect x="7" y="7" width="50" height="40" rx="2" fill="#F4F0E8"/>
  <!-- Pink brushstroke across canvas -->
  <path d="M12,30 C20,20 28,36 38,24 C43,18 50,26 53,21"
        stroke="#E8507A" stroke-width="5.5" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
  <!-- Brush handle below canvas -->
  <rect x="28" y="49" width="8" height="10" rx="4" fill="#C8A83C"/>
  <rect x="26" y="46" width="12" height="5" rx="1" fill="#8C7E72"/>
</svg>
